# =============================================================================
# iredev_config.yaml  –  iReDev Framework configuration
#
# PURPOSE: Framework-level settings — commit this file to version control.
#          It defines agent behaviour, knowledge-base topology, review gates,
#          and artifact storage.  It does NOT contain secrets or provider
#          choices; those live in agent_config.yaml (user-managed, gitignored).
#
# Secrets (API keys, connection strings) are NOT stored here.
# Set them in your .env file (see .env.example).
# Every ${VAR} placeholder is expanded at load time via os.path.expandvars().
# =============================================================================

# ---------------------------------------------------------------------------
# Docstring generation  (framework-wide default)
# ---------------------------------------------------------------------------
docstring_options:
  overwrite_docstrings: false

# ---------------------------------------------------------------------------
# iReDev-specific settings
# ---------------------------------------------------------------------------
iredev:

  # ── Agent configurations ──────────────────────────────────────────────────
  #
  # memory_type must match a MemoryType enum value in memory/types.py:
  #   none | short_term | episodic | semantic | episodic_semantic | short_term_semantic
  #
  # max_react_iterations: max ReAct loop steps per process() call (default 10).
  # max_turns: max conversation turns before safety-net termination.
  # custom_params: agent-specific values read via custom.get() in __init__.
  #
  agents:

    # ── Interviewer ──────────────────────────────────────────────────────────
    # Requires short_term_semantic:
    #   • short_term  → ConversationBuffer fed to ThinkModule each turn.
    #   • semantic    → SemanticMemory for belief-state facts per zone
    #                   (settle_fact / recall_zone / count_zone).
    # custom_params read by InterviewerAgent.__init__:
    #   completeness_threshold → _completeness_threshold (default 0.80)
    #   max_turns              → _max_turns (default 20); also sets state["max_turns"]
    interviewer:
      llm_config: "default"
      memory_type: "short_term"          # ← MUST be semantic for belief-state (later)
      knowledge_modules:
        - "requirements_elicitation"
        - "interview_techniques"
        - "5w1h_methodology"
        - "socratic_questioning"
      max_react_iterations: 10
      max_turns: 50
      timeout_seconds: 600
      memory_limit_mb: 512
      enabled: true
      custom_params:
        completeness_threshold: 0.80              # Tier-2 gate; 0.80 = 80% coverage
        conversation_style: "professional"
        follow_up_depth: 3
        max_turns: 50                             # mirrors max_turns above for _max_turns

    # ── End User ─────────────────────────────────────────────────────────────
    # Simple buffer — one session, no cross-turn persistence needed.
    enduser:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "user_experience"
        - "persona_modeling"
        - "scenario_design"
        - "pain_point_analysis"
      max_react_iterations: 10
      max_turns: 30
      timeout_seconds: 300
      memory_limit_mb: 256
      enabled: true
      custom_params:
        persona_count: 3
        scenario_depth: "detailed"

    # ── Sprint Agent ─────────────────────────────────────────────────────────
    # Runs three pipelines (A-Draft / A-Refine / B) in sequence.
    # INVEST evaluation is delegated to AnalystAgent — knowledge_modules updated.
    # max_react_iterations must cover the longest pipeline (A-Refine: 2 tools,
    # but some backlogs need multiple apply_analyst_feedback rounds).
    sprint_agent:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "agile_estimation"
        - "spidr_splitting"
        - "wsjf_prioritization"
        - "sprint_planning"
      max_react_iterations: 15
      max_turns: 30
      timeout_seconds: 600
      memory_limit_mb: 512
      enabled: true
      custom_params:
        too_big_threshold: 8                      # story_points >= this → flag for split
        fibonacci_sequence: [1, 2, 3, 5, 8, 13, 21]

    # ── Analyst ──────────────────────────────────────────────────────────────
    # NEW: reviews product_backlog_draft with INVEST + NLP + duplicate-risk checks.
    # Writes analyst_feedback artifact; does NOT modify the backlog.
    # memory_type: short_term — one-shot review, no cross-session persistence.
    # max_react_iterations: 2 tools (review_backlog_items + write_analyst_feedback),
    #   but large backlogs may need multiple batched review_backlog_items calls.
    analyst:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "invest_criteria"
        - "requirements_analysis"
        - "acceptance_criteria_patterns"
        - "agile_story_quality"
      max_react_iterations: 8
      max_turns: 20
      timeout_seconds: 400
      memory_limit_mb: 256
      enabled: true
      custom_params:
        dup_similarity_threshold: 0.55            # Jaccard threshold for high duplicate risk
        vague_term_escalate: true                 # vague terms → elevate to medium severity

    # ── Deployer ─────────────────────────────────────────────────────────────
    # (Future agent — not yet active in the workflow.)
    deployer:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "system_architecture"
        - "security_requirements"
        - "compliance_standards"
        - "performance_criteria"
      max_react_iterations: 10
      max_turns: 20
      timeout_seconds: 300
      memory_limit_mb: 256
      enabled: false                              # disabled until workflow step added
      custom_params:
        security_level: "high"
        compliance_regions: ["GDPR", "SOX"]

    # ── Archivist ─────────────────────────────────────────────────────────────
    # (Future agent — not yet active in the workflow.)
    archivist:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "ieee_830_standard"
        - "iso_29148_standard"
        - "technical_writing"
        - "document_templates"
      max_react_iterations: 10
      max_turns: 25
      timeout_seconds: 400
      memory_limit_mb: 256
      enabled: false
      custom_params:
        document_standard: "IEEE_830"
        template_style: "formal"

    # ── Reviewer ─────────────────────────────────────────────────────────────
    # (Future agent — not yet active in the workflow.)
    reviewer:
      llm_config: "default"
      memory_type: "short_term"
      knowledge_modules:
        - "quality_assurance"
        - "validation_techniques"
        - "verification_methods"
        - "defect_identification"
      max_react_iterations: 10
      max_turns: 35
      timeout_seconds: 500
      memory_limit_mb: 256
      enabled: false
      custom_params:
        review_depth: "comprehensive"
        quality_threshold: 0.85

  # ── Knowledge base ────────────────────────────────────────────────────────
  knowledge_base:
    base_path: "knowledge"
    domain_knowledge_path: "knowledge/domains"
    methodology_path: "knowledge/methodologies"
    standards_path: "knowledge/standards"
    templates_path: "knowledge/templates"
    strategies_path: "knowledge/strategies"
    cache_enabled: true
    auto_reload: true
    version_control: true
    backup_enabled: true

    # PostgreSQL / pgvector — connection string comes from .env
    pg_connection: ${IREDEV_PG_CONNECTION}

    # pgvector collection name
    collection_name: "iredev_knowledge"

    # Text splitting
    chunk_size: 800
    chunk_overlap: 100

    # ── Embedding options ──────────────────────────────────────────────────
    #
    # Option A: Local Ollama (default — no cloud key required)
    embedding:
      type: "openai"                # OpenAI-compatible protocol
      model: "nomic-embed-text"     # default local Ollama model
      api_key: "EMPTY"              # Ollama ignores the key
      base_url: ${OLLAMA_BASE_URL}  # e.g. http://localhost:11434/v1
      dims: 768

    # Option B: OpenAI API
    # embedding:
    #   type: "openai"
    #   model: "text-embedding-3-small"
    #   api_key: ${OPENAI_API_KEY}
    #   base_url: ${OPENAI_BASE_URL}
    #   dims: 768

    # Option C: Google Gemini
    # embedding:
    #   type: "google"
    #   model: "gemini-embedding-001"
    #   api_key: ${GEMINI_API_KEY}
    #   dims: 768

    # Option D: Gemini multimodal preview
    # embedding:
    #   type: "openai"
    #   model: "gemini-embedding-2-preview"
    #   api_key: ${GEMINI_API_KEY}
    #   dims: 1536

  # ── Human-in-the-loop ─────────────────────────────────────────────────────
  human_in_loop:
    enabled: true
    review_points:
      - "interview_record"          # review_turn gate after conduct_requirements_interview
    timeout_minutes: 1440           # 24 hours
    notification_channels:
      - "console"
      - "email"
    auto_approve_after_timeout: false
    require_explicit_approval: true

  # ── Artifact pool ─────────────────────────────────────────────────────────
  artifact_pool:
    storage_backend: "filesystem"
    storage_path: "artifacts"
    version_control: true
    backup_enabled: true
    backup_interval_minutes: 60
    max_versions_per_artifact: 10
    compression_enabled: true

  # ── System ────────────────────────────────────────────────────────────────
  logging_level: "INFO"
  debug_mode: false
  metrics_enabled: true