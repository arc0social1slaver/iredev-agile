version: '3.8'

services:
  # Database service cho iReDev
  db:
    image: pgvector/pgvector:pg16
    container_name: iredev-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iredev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: iredev-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iredev.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: