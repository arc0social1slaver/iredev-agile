{% extends "base.html" %}

{% block title %}Error - iReDev Framework{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="text-center">
            <i class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
            <h1 class="display-4 text-danger">Oops!</h1>
            <h2 class="mb-4">Something went wrong</h2>
            <p class="lead text-muted mb-4">{{ error }}</p>
            
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </button>
                <button onclick="location.reload()" class="btn btn-outline-info">
                    <i class="fas fa-sync-alt"></i> Retry
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
